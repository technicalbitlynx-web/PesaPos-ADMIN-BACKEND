version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: pos_admin_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: pos_admin_db
      POSTGRES_USER: pos_admin
      POSTGRES_PASSWORD: pos_admin_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: pos_admin_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  app:
    build: .
    container_name: pos_admin_app
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://pos_admin:pos_admin_pass@postgres:5432/pos_admin_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: change_this_in_production_please
    ports:
      - "3000:3000"
    volumes:
      - ./storage:/app/storage
      - ./logs:/app/logs

volumes:
  postgres_data:
  redis_data:
